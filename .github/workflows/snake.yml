name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Heiny-H
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#B388FF&color_dots=#F8F2FF,#E9D5FF,#D8B4FE,#C084FC,#A855F7
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#E9D5FF&color_dots=#0D1117,#2E1065,#581C87,#A855F7,#E879F9

      - name: Push snake animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
